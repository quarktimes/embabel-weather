server:
  port: 8080

spring:
  application:
    name: embabel-weather
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500, expireAfterWrite=10m

# ── Embabel Agent 配置 ──
embabel:
  agent:
    platform:
      mode: web
      auto-start: true
    models:
      deepseek:
        base-url: https://api.deepseek.com
        api-key: ${DEEPSEEK_API_KEY}
  models:
    default-llm: deepseek-chat
  observability:
    enabled: true
    trace-llm-calls: true
    trace-agent-events: true
    trace-tool-calls: true
    trace-http-details: true
    metrics-enabled: true

# ── OpenTelemetry → Langfuse ──
# 设置环境变量启用：
#   OTEL_EXPORTER_OTLP_ENDPOINT=https://cloud.langfuse.com/api/public/otel
#   OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer base64(public_key:secret_key)
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}

# ── OpenWeather API ──
weather:
  openweather:
    api-key: ${OPENWEATHER_API_KEY}
    base-url: https://api.openweathermap.org/data/2.5
    geo-url: https://api.openweathermap.org/geo/1.0
    units: metric
    lang: zh_cn
