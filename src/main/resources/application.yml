server:
  port: 8080

spring:
  application:
    name: embabel-weather
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500, expireAfterWrite=10m
  autoconfigure:
    exclude:
      # 排除 Embabel 平台自动配置（LLM 模型发现不起作用，我们自行管理 DeepSeek 调用）
      - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration

# OpenWeather API 配置
weather:
  openweather:
    api-key: ${OPENWEATHER_API_KEY}
    base-url: https://api.openweathermap.org/data/2.5
    geo-url: https://api.openweathermap.org/geo/1.0
    units: metric
    lang: zh_cn

# Embabel Agent 配置（自动配置已排除，由代码自行管理 LLM 调用）
